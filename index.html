<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انتقل إلى منصة اليعقوبي التعليمية</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Tajawal", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef6ff, #ffffff, #f3fbf7);
      color: #1f2937;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      padding: 42px 30px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.10);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.8s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.10);
      top: -70px;
      right: -70px;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.12);
      bottom: -65px;
      left: -65px;
    }

    .badge {
      display: inline-block;
      background: #e0f2fe;
      color: #0369a1;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 34px;
      line-height: 1.5;
      color: #0f172a;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    p {
      font-size: 19px;
      line-height: 1.9;
      color: #475569;
      margin-bottom: 26px;
      position: relative;
      z-index: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      background: linear-gradient(135deg, #2563eb, #059669);
      color: #fff;
      padding: 15px 30px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.25);
      transition: 0.25s ease;
      position: relative;
      z-index: 1;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.32);
    }

    .note {
      margin-top: 22px;
      font-size: 14px;
      color: #64748b;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 520px) {
      .card {
        padding: 34px 22px;
        border-radius: 22px;
      }

      h1 {
        font-size: 27px;
      }

      p {
        font-size: 17px;
      }

      .btn {
        width: 100%;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="card">
    <div class="badge">تنبيه مهم</div>

    <h1>انتقل إلى منصة اليعقوبي التعليمية</h1>

    <p>
      نود إشعاركم بأنه تم نقل الخدمة إلى المنصة الجديدة التابعة
      لمدرسة اليعقوبي الثانوية، وذلك لتحسين جودة الوصول وتنظيم الخدمات
      بشكل أكثر كفاءة ووضوحًا.
    </p>

    <a class="btn" id="goBtn" href="https://fahad1.lovable.app/login">
      الدخول إلى المنصة الجديدة
    </a>

    <div class="note" id="countText">
      سيتم توجيهك تلقائيًا خلال 10 ثوانٍ.
    </div>
  </main>

  <script>
    const newPlatformUrl = "https://fahad1.lovable.app/login";
    const countText = document.getElementById("countText");
    const goBtn = document.getElementById("goBtn");

    let seconds = 10;

    const timer = setInterval(() => {
      seconds--;
      countText.textContent = `سيتم توجيهك تلقائيًا خلال ${seconds} ثوانٍ.`;

      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = newPlatformUrl;
      }
    }, 1000);

    goBtn.addEventListener("click", () => {
      clearInterval(timer);
    });
  </script>

</body>
</html>
